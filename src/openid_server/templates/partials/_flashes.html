{% with messages = get_flashed_messages(with_categories=True) %}
    {% if messages %}
        <div class="mt-5">
            {% for category, message in messages %}
                <div class="mb-4 alert alert-{% if category == 'message' %}info{% else %}{{ category }}{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}
